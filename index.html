<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌游选择</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #f7f8fa;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 24px;
        }
        .slider-container {
            margin: 0 auto 30px;
            text-align: center;
        }
        .slider-label {
            font-size: 18px;
            margin-bottom: 10px;
        }
        #playerCount {
            width: 100%;
            accent-color: #4285F4;
        }
        .name-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        .game-card {
            background: white;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: translateY(-2px);
        }
        .game-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .game-info {
            font-size: 12px;
            color: #666;
            margin: 4px 0;
        }
        .submit-btn {
            width: 100%;
            background: #4285F4;
            color: white;
            font-size: 17px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .game-card.hide {
            display: none;
        }
    </style>
</head>
<body>
    <h1>🎲 选择你想玩的桌游（可多选）</h1>

    <!-- 人数筛选 -->
    <div class="slider-container">
        <div class="slider-label">当前人数：<span id="playerValue">2</span> 人</div>
        <input type="range" id="playerCount" min="1" max="18" value="2">
    </div>

    <!-- Formspree 表单 -->
    <form action="https://formspree.io/f/xvzwlrqe" method="POST">
        <input type="hidden" name="_captcha" value="false">
        
        <!-- 姓名 -->
        <label style="display:block; margin-bottom:8px;">你的名字：</label>
        <input type="text" name="姓名" class="name-input" placeholder="输入名字" required>

        <label style="display:block; margin:20px 0 8px;">选择桌游（可多选）：</label>
        
        <!-- 桌游多选卡片 -->
        <div class="game-grid">
            <div class="game-card" data-min="2" data-max="4">
                <img src="splendor.jpg" alt="璀璨宝石">
                <label><input type="checkbox" name="桌游" value="璀璨宝石"> 璀璨宝石</label>
                <div class="game-info">2-4人 | 资源管理</div>
            </div>

            <div class="game-card" data-min="1" data-max="6">
                <img src="unlock.jpg" alt="大搜查!">
                <label><input type="checkbox" name="桌游" value="大搜查!"> 大搜查!</label>
                <div class="game-info">1-6人 | 合作解谜</div>
            </div>

            <div class="game-card" data-min="1" data-max="4">
                <img src="arnak.jpg" alt="失落的遗迹：阿纳克">
                <label><input type="checkbox" name="桌游" value="失落的遗迹：阿纳克"> 阿纳克</label>
                <div class="game-info">1-4人 | 卡牌构筑</div>
            </div>

            <div class="game-card" data-min="3" data-max="6">
                <img src="betrayal.jpg" alt="小黑屋">
                <label><input type="checkbox" name="桌游" value="小黑屋"> 小黑屋</label>
                <div class="game-info">3-6人 | 阵营对抗</div>
            </div>

            <div class="game-card" data-min="2" data-max="2">
                <img src="7wonders-duel.jpg" alt="七大奇迹：对决">
                <label><input type="checkbox" name="桌游" value="七大奇迹：对决"> 七大奇迹对决</label>
                <div class="game-info">2人 | 文明策略</div>
            </div>

            <div class="game-card" data-min="4" data-max="10">
                <img src="avalon-quest.jpg" alt="阿瓦隆：亚瑟传说">
                <label><input type="checkbox" name="桌游" value="阿瓦隆：亚瑟传说"> 阿瓦隆</label>
                <div class="game-info">4-10人 | 身份推理</div>
            </div>

            <div class="game-card" data-min="2" data-max="8">
                <img src="colt-express.jpg" alt="柯尔特快车">
                <label><input type="checkbox" name="桌游" value="柯尔特快车"> 柯尔特快车</label>
                <div class="game-info">2-8人 | 西部抢劫</div>
            </div>

            <div class="game-card" data-min="6" data-max="18">
                <img src="werewolf.jpg" alt="狼人杀">
                <label><input type="checkbox" name="桌游" value="狼人杀"> 狼人杀</label>
                <div class="game-info">6-18人 | 社交推理</div>
            </div>

            <div class="game-card" data-min="3" data-max="18">
                <img src="flip7.jpg" alt="Flip7">
                <label><input type="checkbox" name="桌游" value="Flip7"> Flip7</label>
                <div class="game-info">3-18人 | 欢乐博弈</div>
            </div>

            <div class="game-card" data-min="1" data-max="1">
                <img src="resistance-solo.jpg" alt="抵抗！">
                <label><input type="checkbox" name="桌游" value="抵抗！"> 抵抗！</label>
                <div class="game-info">1人 | 单人叙事</div>
            </div>
        </div>

        <button type="submit" class="submit-btn">提交选择</button>
    </form>

    <script>
        // 人数筛选
        const slider = document.getElementById('playerCount');
        const valueDisplay = document.getElementById('playerValue');
        const cards = document.querySelectorAll('.game-card');

        slider.addEventListener('input', function() {
            const count = parseInt(this.value);
            valueDisplay.textContent = count;
            cards.forEach(card => {
                const min = parseInt(card.dataset.min);
                const max = parseInt(card.dataset.max);
                if (count >= min && count <= max) {
                    card.classList.remove('hide');
                } else {
                    card.classList.add('hide');
                }
            });
        });
    </script>
</body>
</html>
