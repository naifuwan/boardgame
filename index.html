<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌游投票</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f3ee;
      --card: #ffffff;
      --accent: #c8392b;
      --accent-light: #fdf0ee;
      --accent-mid: #e8b4ae;
      --text: #1c1917;
      --sub: #78716c;
      --border: #e7e5e0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0 0 80px;
    }

    /* ── Header ── */
    .hero {
      background: var(--text);
      color: #fff;
      padding: 32px 20px 28px;
      text-align: center;
    }
    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #a8a29e;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .hero h1 span { color: #e87c6f; }
    .hero-sub {
      font-size: 13px;
      color: #a8a29e;
    }

    /* ── Controls bar ── */
    .controls {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .controls-inner { max-width: 880px; margin: 0 auto; }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .slider-row label { font-size: 13px; color: var(--sub); white-space: nowrap; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer; }
    .count-pill {
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      min-width: 44px;
      text-align: center;
    }
    .name-row { display: flex; align-items: center; gap: 8px; }
    .name-row label { font-size: 13px; color: var(--sub); white-space: nowrap; }
    .name-input {
      flex: 1;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--bg);
      transition: border-color 0.15s;
    }
    .name-input:focus { border-color: var(--accent); }
    .selected-tally {
      font-size: 12px;
      color: var(--sub);
      text-align: right;
      margin-top: 8px;
    }
    .selected-tally strong { color: var(--accent); }

    /* ── Page body ── */
    .page-body { max-width: 880px; margin: 0 auto; padding: 0 16px; }

    /* ── Category section ── */
    .category-section { margin-top: 28px; }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .cat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .cat-count {
      font-size: 11px;
      color: var(--sub);
      background: var(--border);
      padding: 1px 7px;
      border-radius: 10px;
    }
    .cat-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Game grid ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* ── Game card ── */
    .game-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .game-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      border-color: #c4bfb8;
    }
    .game-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .game-card.hide { display: none; }
    .game-card input[type=checkbox] { display: none; }

    /* ── Image area ── */
    .img-wrap {
      width: 100%;
      height: 110px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .game-card:hover .img-wrap img { transform: scale(1.04); }
    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 30px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }
    .shimmer {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #e9ecf3 25%, #d8dce8 50%, #e9ecf3 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* check badge */
    .check-badge {
      position: absolute;
      top: 7px; right: 7px;
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .check-badge svg { width: 12px; height: 12px; }
    .game-card.selected .check-badge { display: flex; }

    /* player badge */
    .player-badge {
      position: absolute;
      bottom: 7px; left: 7px;
      background: rgba(0,0,0,0.62);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    /* ── Card body ── */
    .card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .card-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid transparent;
    }
    .card-desc {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.55;
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 2px;
    }

    /* ── Category color themes ── */
    /* 社交推理 */
    .cat-social .cat-dot { background: #7c3aed; }
    .cat-social .tag { background: #f5f3ff; color: #5b21b6; border-color: #ddd6fe; }
    /* 策略经营 */
    .cat-strategy .cat-dot { background: #b45309; }
    .cat-strategy .tag { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
    /* 合作解谜 */
    .cat-coop .cat-dot { background: #0369a1; }
    .cat-coop .tag { background: #f0f9ff; color: #0c4a6e; border-color: #bae6fd; }
    /* 对战竞技 */
    .cat-battle .cat-dot { background: #be123c; }
    .cat-battle .tag { background: #fff1f2; color: #9f1239; border-color: #fecdd3; }
    /* 轻松派对 */
    .cat-party .cat-dot { background: #047857; }
    .cat-party .tag { background: #ecfdf5; color: #064e3b; border-color: #a7f3d0; }
    /* 战棋冒险 */
    .cat-wargame .cat-dot { background: #374151; }
    .cat-wargame .tag { background: #f9fafb; color: #1f2937; border-color: #d1d5db; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px;
      color: var(--sub);
      font-size: 14px;
      display: none;
    }
    .empty-state.show { display: block; }

    /* ── Submit ── */
    .submit-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 20;
    }
    .submit-inner { max-width: 880px; margin: 0 auto; display: flex; gap: 12px; align-items: center; }
    .submit-btn {
      flex: 1;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .submit-btn:hover { background: #a82e22; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-meta { font-size: 12px; color: var(--sub); text-align: center; line-height: 1.4; white-space: nowrap; }
    .submit-meta strong { display: block; font-size: 18px; color: var(--accent); font-weight: 700; }
  </style>
</head>

// ── 渲染 ──────────────────────────────────────────────────
const pageBody = document.getElementById('pageBody');

CATEGORIES.forEach(cat => {
  const sec = document.createElement('div');
  sec.className = `category-section ${cat.cls}`;
  sec.dataset.catId = cat.id;

  sec.innerHTML = `
    <div class="cat-header">
      <div class="cat-dot"></div>
      <div class="cat-title">${cat.label}</div>
      <div class="cat-count" id="count-${cat.id}">${cat.games.length}</div>
      <div class="cat-line"></div>
    </div>
    <div class="game-grid" id="grid-${cat.id}">
      <div class="empty-state" id="empty-${cat.id}">当前人数暂无适合的游戏</div>
    </div>
  `;
  pageBody.appendChild(sec);

  const grid = sec.querySelector(`#grid-${cat.id}`);

  cat.games.forEach(g => {
    const card = document.createElement('label');
    card.className = 'game-card';
    card.dataset.min = g.min;
    card.dataset.max = g.max;
    card.dataset.cat = cat.id;

    const tagsHtml = g.tags.map(t => `<span class="tag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="img-wrap">
        <div class="shimmer" id="sh-${g.full.replace(/\s/g,'')}"></div>
        <img id="img-${g.full.replace(/\s/g,'')}" src="" alt="${g.name}"
             style="opacity:0;position:absolute;inset:0;"
             onerror="this._err=true;showPh(this)">
        <div class="img-placeholder" id="ph-${g.full.replace(/\s/g,'')}" style="display:none"></div>
        <div class="check-badge">
          <svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="player-badge">${g.min === g.max ? g.min + '人' : g.min + '–' + g.max + '人'}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${g.name}</div>
        <div class="card-tags">${tagsHtml}</div>
        <div class="card-desc">${g.desc}</div>
      </div>
      <input type="checkbox" name="桌游" value="${g.full}">
    `;

    card.addEventListener('click', () => {
      requestAnimationFrame(() => {
        const cb = card.querySelector('input[type=checkbox]');
        card.classList.toggle('selected', cb.checked);
        updateCount();
      });
    });

    grid.appendChild(card);
    loadImg(g);
  });
});

// 占位色
const PH_COLORS = [
  ['#1a1d2e','#2d3561'],['#1a3a2e','#0f5c3a'],['#3b1a1a','#8b2020'],
  ['#1a2e3a','#0f4a6e'],['#2e1a3a','#5b2080'],['#3a2e1a','#6e4a0f'],
];
let phIdx = 0;

function loadImg(g) {
  const key = g.full.replace(/\s/g,'');
  const img = document.getElementById('img-' + key);
  const sh  = document.getElementById('sh-' + key);
  const ph  = document.getElementById('ph-' + key);
  const [c1, c2] = PH_COLORS[phIdx++ % PH_COLORS.length];
  ph.style.background = `linear-gradient(135deg,${c1},${c2})`;
  ph.textContent = g.name.charAt(0);

  if (!g.img) { if(sh)sh.remove(); ph.style.display='flex'; return; }
  img.onload = () => {
    if(sh)sh.remove();
    img.style.cssText = 'opacity:1;width:100%;height:100%;object-fit:cover;display:block;';
  };
  img.onerror = () => { if(sh)sh.remove(); ph.style.display='flex'; };
  img.src = g.img;
}

window.showPh = function(imgEl) {
  const id = imgEl.id.replace('img-','ph-');
  const ph = document.getElementById(id);
  if(ph) ph.style.display = 'flex';
};

// ── 人数筛选 ──────────────────────────────────────────────
const slider = document.getElementById('playerCount');
const valDisplay = document.getElementById('playerValue');

function filterGames(n) {
  document.querySelectorAll('.game-card').forEach(card => {
    const fits = n >= +card.dataset.min && n <= +card.dataset.max;
    card.classList.toggle('hide', !fits);
    if (!fits) {
      const cb = card.querySelector('input[type=checkbox]');
      if (cb.checked) { cb.checked = false; card.classList.remove('selected'); }
    }
  });
  // 更新每个分类的可见数量
  CATEGORIES.forEach(cat => {
    const visible = document.querySelectorAll(`[data-cat="${cat.id}"]:not(.hide)`).length;
    const countEl = document.getElementById('count-' + cat.id);
    if (countEl) countEl.textContent = visible;
    const emptyEl = document.getElementById('empty-' + cat.id);
    if (emptyEl) emptyEl.classList.toggle('show', visible === 0);
    // 隐藏整个分类区块如果没有游戏
    const sec = document.querySelector(`[data-cat-id="${cat.id}"]`);
    if (sec) sec.style.display = visible === 0 ? 'none' : '';
  });
  updateCount();
}

slider.addEventListener('input', function() {
  const n = +this.value;
  valDisplay.textContent = n + ' 人';
  filterGames(n);
});

// ── 选中计数 ──────────────────────────────────────────────
function updateCount() {
  const n = document.querySelectorAll('.game-card input:checked').length;
  document.getElementById('selCount').textContent = n;
  document.getElementById('selCount2').textContent = n;
}

window.addEventListener('load', () => filterGames(4));
</script>
