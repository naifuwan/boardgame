<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌游选择</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #f7f8fa;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 24px;
        }
        .name-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        .game-card {
            background: white;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .game-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .submit-btn {
            width: 100%;
            background: #4285F4;
            color: white;
            font-size: 17px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🎲 选择你想玩的桌游（可多选）</h1>

    <form action="https://formspree.io/f/xvzwlrqe" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://naifuwan.github.io/boardgame/">

        <input type="text" name="姓名" placeholder="输入你的名字" class="name-input" required>

        <div class="game-grid">
            <div class="game-card">
                <img src="https://img.nga.178.com/attachments/mon_202503/17/-b4jddQ8k60-1e7kZ1k-t3.jpg" alt="阿瓦隆">
                <label><input type="checkbox" name="桌游" value="阿瓦隆"> 阿瓦隆</label>
            </div>
            <div class="game-card">
                <img src="https://img.nga.178.com/attachments/mon_202503/17/-b4jddQ8k60-7zddZ1n-t3.jpg" alt="狼人杀">
                <label><input type="checkbox" name="桌游" value="狼人杀"> 狼人杀</label>
            </div>
            <div class="game-card">
                <img src="https://img.nga.178.com/attachments/mon_202503/17/-b4jddQ8k60-2c1bZ1l-t3.jpg" alt="三国杀">
                <label><input type="checkbox" name="桌游" value="三国杀"> 三国杀</label>
            </div>
            <div class="game-card">
                <img src="https://img.nga.178.com/attachments/mon_202503/17/-b4jddQ8k60-8x4bZ1m-t3.jpg" alt="璀璨宝石">
                <label><input type="checkbox" name="桌游" value="璀璨宝石"> 璀璨宝石</label>
            </div>
            <div class="game-card">
                <img src="https://img.nga.178.com/attachments/mon_202503/17/-b4jddQ8k60-6x6pZ1o-t3.jpg" alt="卡坦岛">
                <label><input type="checkbox" name="桌游" value="卡坦岛"> 卡坦岛</label>
            </div>
        </div>

        <button class="submit-btn" type="submit">提交选择</button>
    </form>
</body>
</html>
